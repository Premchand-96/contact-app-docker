version: "3.8"

services:

  db:
    image: mysql:5.7
    container_name: contact-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contactsdb
      MYSQL_USER: contactuser
      MYSQL_PASSWORD: Password123
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: contact-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: contact-frontend
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  db_data:
